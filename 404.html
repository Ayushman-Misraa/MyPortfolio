<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Packet Not Found | Ayushman Misra</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #2F4444;
      color: #EDECDB;
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background-image: linear-gradient(to right, rgba(107, 177, 173, 0.05) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(107, 177, 173, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .mono {
      font-family: 'JetBrains Mono', monospace;
    }
    h1 {
      font-size: 10rem;
      margin: 0;
      color: #E6748E;
      text-shadow: 8px 8px 0px #1a2626;
      line-height: 1;
      letter-spacing: -5px;
    }
    p {
      font-size: 1.2rem;
      color: #A7BCBD;
      max-width: 600px;
      margin: 20px auto 40px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      padding: 15px 30px;
      background-color: #EDECDB;
      color: #2F4444;
      text-decoration: none;
      font-weight: bold;
      border: 2px solid #1a2626;
      box-shadow: 6px 6px 0px #6BB1AD;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    a:hover {
      background-color: #E6748E;
      color: white;
      box-shadow: 0px 0px 0px transparent;
      transform: translate(6px, 6px);
      border-color: #E6748E;
    }
    .status {
      color: #6BB1AD;
      margin-bottom: 10px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 5px;
    }
  </style>
</head>
<body>
  <div class="mono status">> ERROR_404</div>
  <h1>404</h1>
  <p class="mono">The requested data packet could not be located on this server. It may have been encrypted, deleted, or you simply entered the wrong path.</p>
  <a href="/" class="mono">[ INITIATE_RETURN_SEQUENCE ]</a>
</body>
</html>
